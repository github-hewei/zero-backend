/article/category/list:
  post:
    tags:
      - 文章分类管理
    summary: 获取文章分类列表
    operationId: getArticleCategoryList
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - page
              - limit
            properties:
              name:
                type: string
                description: 分类名称
              status:
                type: integer
                description: 状态 (0隐藏 1显示)
              store_id:
                type: integer
                description: 企业ID
              page:
                type: integer
              limit:
                type: integer
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                errcode:
                  type: integer
                message:
                  type: string
                data:
                  type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: '../schemas.yaml#/schemas/ArticleCategory'
                    total:
                      type: integer

