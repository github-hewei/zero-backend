/article/article/create:
  post:
    tags:
      - 文章管理
    summary: 创建文章
    operationId: createArticle
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - title
              - show_type
              - category_id
              - content
              - sort
              - status
            properties:
              title:
                type: string
                description: 文章标题
              show_type:
                type: integer
                description: 显示方式 (10小图 20大图)
              category_id:
                type: integer
                description: 分类ID
              image_id:
                type: integer
                description: 封面图ID
              content:
                type: string
                description: 文章内容
              sort:
                type: integer
                description: 排序
              status:
                type: integer
                description: 状态 (0隐藏 1显示)
              virtual_views:
                type: integer
                description: 虚拟阅读量
              store_id:
                type: integer
                description: 企业ID
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas.yaml#/schemas/CommonResponse'

