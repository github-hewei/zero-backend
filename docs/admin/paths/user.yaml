/user/user/list:
  post:
    tags:
      - 用户管理
    summary: 获取用户列表
    operationId: getUserList
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - page
              - limit
            properties:
              username:
                type: string
                description: 用户名
              mobile:
                type: string
                description: 手机号
              status:
                type: integer
                description: 账号状态 (1正常 2禁用)
              store_id:
                type: integer
                description: 企业ID
              page:
                type: integer
              limit:
                type: integer
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                errcode:
                  type: integer
                message:
                  type: string
                data:
                  type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: '../schemas.yaml#/schemas/User'
                    total:
                      type: integer

/user/user/create:
  post:
    tags:
      - 用户管理
    summary: 创建用户
    operationId: createUser
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - password
              - mobile
              - nick_name
              - gender
              - status
            properties:
              username:
                type: string
                description: 用户名
              password:
                type: string
                description: 密码
              mobile:
                type: string
                description: 手机号
              nick_name:
                type: string
                description: 昵称
              avatar_id:
                type: integer
                description: 头像文件ID
              gender:
                type: integer
                description: 性别 (0未知 1男 2女)
              status:
                type: integer
                description: 账号状态 (1正常 2禁用)
              store_id:
                type: integer
                description: 企业ID
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas.yaml#/schemas/CommonResponse'

