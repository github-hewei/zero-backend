/captcha/generate:
  post:
    tags:
      - 验证码
    summary: 生成图形验证码
    description: |
      生成点选验证码，返回验证码ID和两张base64编码的图片。
      - master_image：主图（含文字提示的大图）
      - thumb_image：缩略图（需要点击的小图）
    operationId: captchaGenerate
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas.yaml#/schemas/CaptchaGenerateResponse'
