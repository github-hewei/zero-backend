/rbac/store/list:
  post:
    tags:
      - 企业管理
    summary: 获取企业列表
    description: 获取所有租户企业列表。超管和运营可操作。
    operationId: platformGetStoreList
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - page
              - limit
            properties:
              page:
                type: integer
                description: 页码
                example: 1
              limit:
                type: integer
                description: 每页数量
                example: 20
              name:
                type: string
                description: 企业名称
              is_recycle:
                type: integer
                description: 是否回收 (0否 1是 -1全部)
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              type: object
              properties:
                errcode:
                  type: integer
                message:
                  type: string
                data:
                  type: object
                  properties:
                    list:
                      type: array
                      items:
                        $ref: '../schemas.yaml#/schemas/RbacStore'
                    total:
                      type: integer

/rbac/store/create:
  post:
    tags:
      - 企业管理
    summary: 创建企业
    description: 创建一个新的租户企业。超管和运营可操作。
    operationId: platformCreateStore
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - name
              - short_name
              - contact
              - contact_phone
            properties:
              name:
                type: string
                description: 企业名称
              short_name:
                type: string
                description: 企业简称
              contact:
                type: string
                description: 企业联系人
              contact_phone:
                type: string
                description: 联系电话
              description:
                type: string
                description: 简介
              logo_image_id:
                type: integer
                description: LOGO文件ID
              sort:
                type: integer
                description: 排序
    responses:
      '200':
        description: 成功
        content:
          application/json:
            schema:
              $ref: '../schemas.yaml#/schemas/CommonResponse'

