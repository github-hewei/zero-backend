basePath: /api
definitions:
  internal_modules_rbac.AdminLoginResponse:
    properties:
      token:
        type: string
      ttl:
        type: integer
      user:
        $ref: '#/definitions/internal_modules_rbac.RbacUser'
    type: object
  internal_modules_rbac.AuthGetPermissionsRequest:
    properties:
      is_tree:
        type: boolean
    type: object
  internal_modules_rbac.AuthLoginRequest:
    properties:
      captcha_code:
        type: string
      captcha_id:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - captcha_code
    - captcha_id
    - password
    - username
    type: object
  internal_modules_rbac.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 20
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  internal_modules_rbac.RbacMenu:
