      role_id:
        type: integer
      store_id:
        type: integer
      user_id:
        type: integer
    type: object
  internal_modules_user.UploadFile:
    properties:
      domain:
        type: string
      file_name:
        type: string
      file_path:
        type: string
      id:
        type: integer
    type: object
  internal_modules_user.User:
