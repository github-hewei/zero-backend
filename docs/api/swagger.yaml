      name:
        type: string
      parent_id:
        type: integer
      path:
        type: string
      sort:
        type: integer
      type:
        type: integer
      updated_at:
        type: integer
    type: object
  internal_modules_rbac.RbacRole:
    properties:
      children:
        items:
          $ref: '#/definitions/internal_modules_rbac.RbacRole'
        type: array
      created_at:
        type: integer
      id:
        type: integer
      parent_id:
        type: integer
      rbac_role_menu:
        items:
          $ref: '#/definitions/internal_modules_rbac.RbacRoleMenu'
        type: array
      role_name:
        type: string
      sort:
        type: integer
      store_id:
        type: integer
      updated_at:
        type: integer
    type: object
  internal_modules_rbac.RbacRoleMenu:
    properties:
      created_at:
        type: integer
      id:
        type: integer
      menu_id:
        type: integer
      rbac_menu:
        $ref: '#/definitions/internal_modules_rbac.RbacMenu'
      role_id:
        type: integer
      store_id:
        type: integer
    type: object
  internal_modules_rbac.RbacUser:
    properties:
      created_at:
        type: integer
      id:
        type: integer
      is_super:
        type: integer
      rbac_user_role:
