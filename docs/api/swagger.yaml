  internal_modules_user.UserLoginResponse:
    properties:
      token:
        type: string
      ttl:
        type: integer
      user:
        $ref: '#/definitions/internal_modules_user.User'
    type: object
  response.Response:
    properties:
      cost:
        type: string
      data: {}
      errcode:
        type: integer
      message:
        type: string
      traceId:
        type: string
    type: object
  zero-backend_internal_modules_rbac.AuthLoginRequest:
    properties:
      captcha_code:
        type: string
      captcha_id:
        type: string
      password:
        type: string
      username:
        type: string
    required:
    - captcha_code
    - captcha_id
    - password
    - username
    type: object
  zero-backend_internal_modules_rbac.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 20
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
host: localhost:8081
info:
  contact: {}
  title: Zero API
  version: "1.0"
paths:
  /change-password:
    post:
      parameters:
      - description: 修改密码参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/zero-backend_internal_modules_rbac.ChangePasswordRequest'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户修改密码
      tags:
      - 用户认证
  /login:
    post:
      parameters:
      - description: 登录参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/zero-backend_internal_modules_rbac.AuthLoginRequest'
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_modules_user.UserLoginResponse'
              type: object
      summary: 用户登录
      tags:
      - 用户认证
  /logout:
    post:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: 用户登出
      tags:
      - 用户认证
  /permissions:
    post:
      parameters:
      - description: 查询参数
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_rbac.AuthGetPermissionsRequest'
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/internal_modules_rbac.RbacMenu'
                  type: array
              type: object
      summary: 获取用户权限菜单
      tags:
      - 认证
  /refresh-token:
    post:
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/internal_modules_user.UserLoginResponse'
              type: object
      summary: 用户刷新令牌
      tags:
      - 用户认证
swagger: "2.0"
